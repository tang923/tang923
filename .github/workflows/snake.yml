name: Generate Snake Neon

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: generate neon snake (svg + gif)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # Light: neon gradient snake + soft glow grid
            dist/github-snake.svg?color_snake=#00f5ff&color_dots=#ebedf0,#dbeafe,#a5b4fc,#818cf8,#22d3ee
            dist/github-snake.gif?color_snake=#00f5ff&color_dots=#ebedf0,#dbeafe,#a5b4fc,#818cf8,#22d3ee

            # Dark: neon gradient snake + glowing grid on night background
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00ff9c&color_dots=#0b1020,#111a33,#1b2a57,#3b82f6,#00ff9c
            dist/github-snake-dark.gif?palette=github-dark&color_snake=#00ff9c&color_dots=#0b1020,#111a33,#1b2a57,#3b82f6,#00ff9c

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
