name: Generate Snake Neon Cyberpunk

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: generate neon cyberpunk snake (svg + gif)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # ---------- SVG (crisp) ----------
            # Light: cyan snake + soft neon grid
            dist/github-snake.svg?color_snake=#00e5ff&color_dots=#ebedf0,#dbeafe,#a5b4fc,#60a5fa,#00e5ff

            # Dark: neon snake + glowing grid (night cyber)
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00ff9c&color_dots=#050814,#0b1028,#14204a,#1e40af,#00ff9c

            # ---------- GIF (more "trail-like") ----------
            # Dark GIF: force a deep background for stronger neon vibe
            dist/github-snake-dark.gif?palette=github-dark&color_snake=#00ff9c&color_dots=#050814,#0b1028,#14204a,#1e40af,#00ff9c&color_background=#050814

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
