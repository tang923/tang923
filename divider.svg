<svg viewBox="0 0 800 60" width="800" height="60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      .wave1 { animation: waveMove 8s linear infinite; }
      .wave2 { animation: waveMove 6s linear infinite reverse; }
      .wave3 { animation: waveMove 10s linear infinite; }

      @keyframes waveMove {
        0% { transform: translateX(0%); }
        100% { transform: translateX(50%); }
      }
    </style>

    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffc8;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#ff6b6b;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#00ffc8;stop-opacity:0.6" />
    </linearGradient>

    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ff6b6b;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:0.3" />
    </linearGradient>

    <path id="wave" d="M0,30 C100,10 200,50 400,30 C600,10 700,50 800,30 L800,60 L0,60 Z" />
  </defs>

  <rect width="800" height="60" fill="#0a0a0f"/>

  <use class="wave1" href="#wave" fill="url(#grad2)" opacity="0.5"/>
  <use class="wave2" href="#wave" fill="url(#grad1)" opacity="0.3" x="-400"/>
  <use class="wave3" href="#wave" fill="url(#grad2)" opacity="0.4" x="-200"/>

  <line x1="0" y1="30" x2="800" y2="30" stroke="#00ffc8" stroke-width="0.5" opacity="0.1"/>
</svg>
