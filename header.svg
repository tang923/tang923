<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff">
        <animate attributeName="stop-color" dur="10s" repeatCount="indefinite"
                 values="#eef2ff;#e0e7ff;#ddd6fe;#eef2ff"/>
      </stop>
      <stop offset="55%" stop-color="#ddd6fe">
        <animate attributeName="stop-color" dur="10s" repeatCount="indefinite"
                 values="#ddd6fe;#c7d2fe;#e0e7ff;#ddd6fe"/>
      </stop>
      <stop offset="100%" stop-color="#f5f3ff">
        <animate attributeName="stop-color" dur="10s" repeatCount="indefinite"
                 values="#f5f3ff;#ede9fe;#e0e7ff;#f5f3ff"/>
      </stop>
    </linearGradient>

    <radialGradient id="blob" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#818cf8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="shimmerGrad" x1="-20%" y1="0%" x2="120%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="meteorGlow">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="meteorStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#c7d2fe" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>

    <mask id="typeMaskTitle">
      <rect x="0" y="0" width="1200" height="320" fill="black"/>
      <rect x="0" y="0" width="0" height="320" fill="white">
        <animate attributeName="width"
                 values="0;900;900;0"
                 keyTimes="0;0.45;0.85;1"
                 dur="7.2s"
                 repeatCount="indefinite"/>
      </rect>
    </mask>

    <mask id="typeMaskSub">
      <rect x="0" y="0" width="1200" height="320" fill="black"/>
      <rect x="0" y="0" width="0" height="320" fill="white">
        <animate attributeName="width"
                 values="0;900;900;0"
                 keyTimes="0;0.55;0.9;1"
                 dur="7.2s"
                 repeatCount="indefinite"/>
      </rect>
    </mask>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGradient)"/>
  <rect width="1200" height="320" filter="url(#noise)" opacity="0.28"/>

  <circle cx="320" cy="120" r="190" fill="url(#blob)" opacity="0.95">
    <animate attributeName="cx" dur="11s" repeatCount="indefinite" values="260;980;260"/>
    <animate attributeName="cy" dur="11s" repeatCount="indefinite" values="110;210;110"/>
  </circle>

  <rect x="30" y="30" width="1140" height="260" rx="22"
        fill="#ffffff" opacity="0.16"
        stroke="#c7d2fe" stroke-width="2" />

  <rect x="44" y="44" width="1112" height="232" rx="18"
        fill="none" stroke="#a5b4fc" stroke-width="1" opacity="0.35"/>

  <rect x="-420" y="0" width="420" height="320" fill="url(#shimmerGrad)" opacity="0.65">
    <animate attributeName="x" dur="6s" repeatCount="indefinite" values="-420;1200"/>
  </rect>

  <g filter="url(#meteorGlow)" opacity="0.85">
    <g>
      <line x1="-200" y1="40" x2="-80" y2="-40" stroke="url(#meteorStroke)" stroke-width="3" stroke-linecap="round"/>
      <line x1="-220" y1="60" x2="-90" y2="-35" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.2" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; 1600 360"
                        dur="5.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.1;0.6;1" dur="5.6s" repeatCount="indefinite"/>
    </g>

    <g>
      <line x1="-240" y1="120" x2="-115" y2="30" stroke="url(#meteorStroke)" stroke-width="2.6" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; 1600 360"
                        dur="6.8s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.12;0.62;1" dur="6.8s" begin="1.2s" repeatCount="indefinite"/>
    </g>

    <g opacity="0.8">
      <line x1="-260" y1="220" x2="-140" y2="135" stroke="url(#meteorStroke)" stroke-width="2.3" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; 1600 360"
                        dur="7.4s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.12;0.62;1" dur="7.4s" begin="2.4s" repeatCount="indefinite"/>
    </g>
  </g>

  <g mask="url(#typeMaskTitle)">
    <text x="600" y="150" text-anchor="middle"
          font-size="46" font-family="Georgia, serif"
          fill="#1e1b4b" filter="url(#glow)" letter-spacing="4">
      YUYAO TANG
    </text>
  </g>

  <g mask="url(#typeMaskSub)">
    <text x="600" y="192" text-anchor="middle"
          font-size="18" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif"
          fill="#6366f1">
      M.S. @ Duke ECE • ML Track
    </text>
  </g>

  <g opacity="0.55">
    <circle cx="220" cy="88" r="2.1" fill="#6366f1">
      <animate attributeName="cy" dur="5s" repeatCount="indefinite" values="90;70;90"/>
      <animate attributeName="opacity" dur="5s" repeatCount="indefinite" values="0.55;0.22;0.55"/>
    </circle>
    <circle cx="980" cy="210" r="2.2" fill="#a5b4fc">
      <animate attributeName="cx" dur="7s" repeatCount="indefinite" values="980;955;980"/>
      <animate attributeName="opacity" dur="7s" repeatCount="indefinite" values="0.5;0.2;0.5"/>
    </circle>
    <circle cx="760" cy="78" r="2.0" fill="#818cf8">
      <animate attributeName="cx" dur="6.5s" repeatCount="indefinite" values="760;790;760"/>
      <animate attributeName="opacity" dur="6.5s" repeatCount="indefinite" values="0.45;0.18;0.45"/>
    </circle>
  </g>
</svg>
