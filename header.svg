<svg fill="none" viewBox="0 0 800 320" width="800" height="320" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .container {
          width: 100%;
          height: 320px;
          background: #0a0a0f;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          position: relative;
          overflow: hidden;
          font-family: monospace;
        }

        /* animated grid background */
        .grid {
          position: absolute;
          top: 0; left: 0;
          width: 200%;
          height: 200%;
          background-image:
            linear-gradient(rgba(0,255,200,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,255,200,0.03) 1px, transparent 1px);
          background-size: 40px 40px;
          animation: gridScroll 20s linear infinite;
        }

        @keyframes gridScroll {
          0% { transform: translate(0, 0); }
          100% { transform: translate(-40px, -40px); }
        }

        /* floating particles */
        .particle {
          position: absolute;
          width: 2px;
          height: 2px;
          border-radius: 50%;
          background: #00ffc8;
          opacity: 0;
          animation: float 6s ease-in-out infinite;
        }
        .particle:nth-child(2) { left: 15%; top: 20%; animation-delay: 0s; animation-duration: 7s; }
        .particle:nth-child(3) { left: 35%; top: 70%; animation-delay: 1s; animation-duration: 5s; }
        .particle:nth-child(4) { left: 55%; top: 30%; animation-delay: 2s; animation-duration: 8s; }
        .particle:nth-child(5) { left: 75%; top: 60%; animation-delay: 0.5s; animation-duration: 6s; }
        .particle:nth-child(6) { left: 85%; top: 15%; animation-delay: 3s; animation-duration: 7s; }
        .particle:nth-child(7) { left: 25%; top: 45%; animation-delay: 1.5s; animation-duration: 5.5s; }
        .particle:nth-child(8) { left: 65%; top: 80%; animation-delay: 2.5s; animation-duration: 6.5s; }
        .particle:nth-child(9) { left: 45%; top: 10%; animation-delay: 0.8s; animation-duration: 7.5s; }
        .particle:nth-child(10) { left: 90%; top: 50%; animation-delay: 1.8s; animation-duration: 5.8s; }
        .particle:nth-child(11) { left: 10%; top: 85%; animation-delay: 3.2s; animation-duration: 6.2s; }

        @keyframes float {
          0%, 100% { opacity: 0; transform: translateY(0); }
          50% { opacity: 0.8; transform: translateY(-30px); }
        }

        /* glowing orb */
        .orb {
          position: absolute;
          width: 300px;
          height: 300px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(0,255,200,0.08) 0%, transparent 70%);
          animation: pulse 4s ease-in-out infinite;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
        }

        @keyframes pulse {
          0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
          50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        /* main title */
        .title {
          font-size: 3em;
          font-weight: bold;
          color: #e0e0e0;
          position: relative;
          z-index: 2;
          text-shadow:
            0 0 10px rgba(0,255,200,0.3),
            0 0 40px rgba(0,255,200,0.1);
          animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
          0% { text-shadow: 0 0 10px rgba(0,255,200,0.3), 0 0 40px rgba(0,255,200,0.1); }
          100% { text-shadow: 0 0 20px rgba(0,255,200,0.5), 0 0 60px rgba(0,255,200,0.2), 0 0 80px rgba(0,255,200,0.1); }
        }

        /* subtitle with typing effect */
        .subtitle {
          font-size: 1em;
          color: #00ffc8;
          margin-top: 12px;
          position: relative;
          z-index: 2;
          opacity: 0.9;
        }

        .cursor {
          display: inline-block;
          width: 8px;
          height: 1.1em;
          background: #00ffc8;
          margin-left: 4px;
          vertical-align: text-bottom;
          animation: blink 1s step-end infinite;
        }

        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }

        /* bottom accent line */
        .accent-line {
          position: absolute;
          bottom: 0;
          left: 0;
          width: 100%;
          height: 2px;
          background: linear-gradient(90deg, transparent, #00ffc8, #ff6b6b, #00ffc8, transparent);
          background-size: 200% 100%;
          animation: lineFlow 3s linear infinite;
        }

        @keyframes lineFlow {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }

        /* decorative corner brackets */
        .corner {
          position: absolute;
          width: 20px;
          height: 20px;
          border-color: #00ffc8;
          border-style: solid;
          opacity: 0.4;
          z-index: 2;
        }
        .corner.tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
        .corner.tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
        .corner.bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
        .corner.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

        /* status badge */
        .status {
          font-size: 0.75em;
          color: #666;
          margin-top: 16px;
          position: relative;
          z-index: 2;
          letter-spacing: 2px;
        }

        .status-dot {
          display: inline-block;
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: #00ffc8;
          margin-right: 6px;
          animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
          0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,200,0.4); }
          50% { box-shadow: 0 0 0 6px rgba(0,255,200,0); }
        }
      </style>

      <div class="container">
        <div class="grid"></div>
        <div class="orb"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="title">YUYAO TANG</div>
        <div class="subtitle">&gt; building things that think <span class="cursor"></span></div>
        <div class="status"><span class="status-dot"></span>DUKE ECE · LLM · RAG · DIFFUSION</div>

        <div class="accent-line"></div>
      </div>
    </div>
  </foreignObject>
</svg>
